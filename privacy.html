<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <title>鲜花日记 隐私政策 | Privacy Policy</title>
  <style>
    .lang-switch { margin: 20px 0; }
    .lang-switch button { margin-right: 10px; padding: 8px 16px; }
    .content { display: none; }
    .content.active { display: block; }
  </style>
</head>
<body>
  <div class="lang-switch">
    <button onclick="showLang('zh-Hans')">简体中文</button>
    <button onclick="showLang('zh-Hant')">繁體中文</button>
    <button onclick="showLang('en')">English</button>
  </div>

  <div id="zh-Hans" class="content active">
    <!-- 簡中 Markdown 轉 HTML 內容 -->
  </div>

  <div id="zh-Hant" class="content">
    <!-- 繁中 Markdown 轉 HTML 內容 -->
  </div>

  <div id="en" class="content">
    <!-- 英文 Markdown 轉 HTML 內容 -->
  </div>

  <script>
    function showLang(lang) {
      document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
      document.getElementById(lang).classList.add('active');
    }
  </script>
</body>
</html>
